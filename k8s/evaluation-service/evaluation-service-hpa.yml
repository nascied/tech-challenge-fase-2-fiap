apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: evaluation-service-hpa
  namespace: fiap-tc-f2
 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: evaluation-service
  minReplicas: 1      # Mínimo 1 pod
  maxReplicas: 2      # Máximo 3 pods
  
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80