apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
 
spec:
  selector:
    matchLabels:
      app: evaluation-service
  replicas: 1
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
        - name: evaluation-service
          image: 876080138877.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:v1
          ports:
            - containerPort: 8004
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3 
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: evaluation-service-secret
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                configMapKeyRef: 
                  name: evaluation-service-config-map
                  key: PORT
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef: 
                  name: evaluation-service-config-map
                  key: AUTH_SERVICE_URL
                  
