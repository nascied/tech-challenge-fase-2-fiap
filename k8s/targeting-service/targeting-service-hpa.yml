apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: targeting-service-hpa
 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: targeting-service
  minReplicas: 1      # Mínimo 1 pod
  maxReplicas: 3      # Máximo 3 pods
  
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80